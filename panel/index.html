<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Toshi</title>
<!--
  Toshi — a floating desktop companion (Clippy-energy). In Electron it's a frameless, transparent,
  always-on-top window you drag over any terminal. Mascot: the community-ready Toshi from
  tinyhumansai/mascots (GPL-3.0, attributed) — its Rive state machine has NO inputs, so we drive it by
  playing its named LINEAR animations (idle / wave / Dancing / Celebrating / eyes_* / mouth_*). Brain: the
  local Toshi MCP (/ask :4820) → codebase-memory-mcp. Nothing invented.
-->
<script src="https://unpkg.com/@rive-app/canvas@2.38.4/rive.js"></script>
<style>
  :root{
    /* BASED palette — Toshi is Base's cat, the pod wears Base blue (#0052FF) */
    --base:#0052FF; --base-soft:#4d7fff; --line:#162a5e; --ink:#e8eef6; --dim:#8ea0c4; --faint:#5a6a92;
    --teal:#4ec9b0; --amber:#e5b567;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:transparent}
  body{color:var(--ink); font-family:var(--mono); font-size:13px; display:grid; place-items:center; -webkit-font-smoothing:antialiased; overflow:hidden}

  .pod{
    width:min(300px,100vw); height:min(460px,100vh);
    display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0a1430 0%, #060b1c 100%);
    /* subtle chrome only — a soft translucent hairline instead of the hard --line edge, so the card frames
       the panel without boxing in the mascot. Depth comes from the shadow + inset glow, not a visible border. */
    border:1px solid rgba(77,127,255,.12); border-radius:18px; overflow:hidden;
    box-shadow:0 30px 70px -28px #000, 0 0 44px -18px rgba(0,82,255,.45), 0 0 0 1px rgba(0,82,255,.05) inset;
    animation:pop .5s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.94)} to{opacity:1; transform:none}}

  .head{display:flex; align-items:center; gap:8px; padding:9px 12px; -webkit-app-region:drag; cursor:grab;
    background:linear-gradient(180deg, rgba(0,82,255,.16), rgba(0,82,255,.03)); border-bottom:1px solid rgba(0,82,255,.12)}
  .head:active{cursor:grabbing}
  /* the Base mark: a blue rounded square, gently breathing */
  .baselogo{width:14px;height:14px;border-radius:4px;background:var(--base);
    box-shadow:0 0 10px rgba(0,82,255,.75), 0 0 0 1px rgba(255,255,255,.12) inset;
    animation:base-breathe 3.2s ease-in-out infinite}
  @keyframes base-breathe{50%{box-shadow:0 0 16px rgba(0,82,255,1), 0 0 0 1px rgba(255,255,255,.2) inset; transform:scale(1.08)}}
  .logo{font-weight:900; letter-spacing:.34em; font-size:12.5px; color:#fff;
    text-shadow:0 0 12px rgba(0,82,255,.85)}
  .pose-tag{margin-left:auto; color:var(--faint); font-size:9px; letter-spacing:.12em; text-transform:uppercase}
  .x{-webkit-app-region:no-drag; margin-left:8px; color:var(--faint); background:none; border:0; font:inherit; font-size:14px; cursor:pointer; line-height:1; padding:2px 4px}
  .x:hover{color:var(--ink)}

  .stage{position:relative; flex:1; min-height:0; cursor:pointer}
  .stage::before{content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 44%, rgba(0,82,255,.20), transparent 62%)}
  /* the head divider is chrome — keep it a whisper so it doesn't read as a box edge under the mascot */
  .floaty{position:absolute; inset:0; animation:float 5.5s ease-in-out infinite; transform-origin:50% 80%}
  @keyframes float{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
  /* react/nope are transient overlays — JS removes the class so float always resumes */
  .floaty.react{animation:react .5s ease}
  @keyframes react{0%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-4px) rotate(-3deg)} 60%{transform:translateY(-2px) rotate(2deg)} 100%{transform:none}}
  .floaty.nope{animation:nope .45s ease}
  @keyframes nope{0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}}
  #toshi{position:absolute; inset:0; width:100%; height:100%; display:block}
  /* faint scanline texture — softened and radially masked so it fades out before the panel walls, i.e. no
     hard rectangle framing the mascot (the "on voit les bords" edge). Mascot now reads as floating. */
  .stage::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.22;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px);
    -webkit-mask:radial-gradient(ellipse 78% 72% at 50% 46%, #000 55%, transparent 92%);
            mask:radial-gradient(ellipse 78% 72% at 50% 46%, #000 55%, transparent 92%)}
  .loading{position:absolute; inset:0; display:grid; place-items:center; color:var(--dim); font-size:11px}
  .loading.gone{display:none}

  .spark{position:absolute; width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:0;pointer-events:none;filter:blur(.3px)}
  .spark.go{animation:spark .9s ease-out forwards}
  @keyframes spark{0%{opacity:1; transform:translate(0,0) scale(1)} 100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.2)}}

  .bubble{
    position:absolute; left:10px; right:10px; bottom:8px;
    background:rgba(7,11,25,.95); border:1px solid var(--line); border-radius:11px;
    padding:6px 9px 14px; font-size:10.5px; line-height:1.38; color:var(--ink);
    opacity:0; transform:translateY(6px); transition:.22s; pointer-events:auto;
    /* max-height 50% (was 34%) — the bubble is the main surface, give it the room it needs to read
       a full grounded answer in one go. overflow-y:auto still kicks in for long replies, and the
       user can scroll up/down freely (no more auto-reset, no more forced scroll-to-bottom — the
       panel only nudges down when the user was already at the bottom). The 14px bottom padding
       reserves a band for the fading chevron (`.bubble-more`) when the body overflows. */
    max-height:50%; overflow-y:auto; overflow-x:hidden; white-space:pre-wrap;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    scrollbar-gutter:stable;
  }
  /* the chevron `.bubble-more` (▾) lives at the bottom of the bubble. It fades in only when the body
     actually overflows (.has-more is toggled by updateOverflowHint) — and only when the user is NOT
     already at the very bottom (else the chevron would be a lie: there's nothing more "down" to read).
     The sticky positioning + a soft gradient reinforce the "scroll up for more" hint without being loud. */
  .bubble-more{
    position:sticky; bottom:0; display:block; text-align:center; pointer-events:none;
    font-size:11px; line-height:1; color:var(--base-soft);
    margin:6px 0 -10px; padding:6px 0 0;
    background:linear-gradient(180deg, transparent, rgba(7,11,25,.85) 40%, rgba(7,11,25,.95));
    opacity:0; transform:translateY(2px); transition:opacity .25s ease, transform .25s ease;
  }
  .bubble.has-more .bubble-more{ opacity:.85; transform:none; }
  .bubble.has-more.at-bottom .bubble-more{ opacity:0; }
  /* webkit scrollbar: a thin Base-blue rail so the user sees there's something to scroll. Stays hidden
     in mini mode (the .mini rule already overrides it below) — mini = purely visual, no chrome. */
  .bubble::-webkit-scrollbar{ width:6px; height:6px; }
  .bubble::-webkit-scrollbar-track{ background:transparent; }
  .bubble::-webkit-scrollbar-thumb{ background:rgba(0,82,255,.35); border-radius:6px; }
  .bubble::-webkit-scrollbar-thumb:hover{ background:rgba(0,82,255,.65); }
  .bubble.on{opacity:1; transform:none; animation:bubble-pop .34s cubic-bezier(.2,1.4,.4,1)}
  @keyframes bubble-pop{0%{opacity:0; transform:translateY(10px) scale(.92)} 100%{opacity:1; transform:none}}
  .bubble .who{color:var(--amber); font-size:8px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:2px; display:flex; align-items:center; gap:6px}
  .bubble .grounded{color:var(--teal); font-size:8px; border:1px solid rgba(78,201,176,.4); border-radius:6px; padding:0 4px}
  .bubble .emote{margin-left:auto; font-size:12px; animation:emote-pop .6s cubic-bezier(.2,1.6,.4,1)}
  @keyframes emote-pop{0%{transform:scale(0) rotate(-30deg)} 60%{transform:scale(1.5) rotate(10deg)} 100%{transform:scale(1) rotate(0)}}
  /* typing: bouncing dots (gif-energy, zero assets) */
  .dots span{display:inline-block; animation:bounce-dot .9s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.15s} .dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce-dot{0%,100%{transform:translateY(0); opacity:.4} 40%{transform:translateY(-4px); opacity:1}}

  .chips{display:flex; gap:6px; padding:0 11px 7px; -webkit-app-region:no-drag}
  .chips button{font:inherit; font-size:9.5px; letter-spacing:.04em; color:var(--dim); background:rgba(0,82,255,.10);
    border:1px solid rgba(0,82,255,.28); border-radius:999px; padding:4px 9px; cursor:pointer;
    transition:transform .12s ease, background .15s, color .15s, box-shadow .15s}
  .chips button:hover{color:#fff; background:rgba(0,82,255,.32); transform:translateY(-1.5px);
    box-shadow:0 4px 14px -6px rgba(0,82,255,.9), 0 0 0 1px rgba(0,82,255,.35)}
  .chips button:active{transform:translateY(0) scale(.95); background:var(--base); color:#fff}
  .ask{display:flex; gap:8px; padding:9px 11px; border-top:1px solid rgba(0,82,255,.22);
    background:linear-gradient(180deg, rgba(0,82,255,.10), rgba(0,82,255,.02)); -webkit-app-region:no-drag}
  .ask input{flex:1; min-width:0; background:#070d1e; border:1px solid var(--line); border-radius:10px; color:var(--ink); font:inherit; font-size:12.5px; padding:9px 11px}
  .ask input::placeholder{color:var(--faint)}
  .ask input:focus{outline:none; border-color:var(--base-soft); box-shadow:0 0 0 3px rgba(0,82,255,.18)}
  .ask button{font:inherit; font-size:13px; font-weight:800; color:#fff; background:var(--base); border:0; border-radius:10px; padding:0 13px; cursor:pointer; box-shadow:0 4px 14px -6px rgba(0,82,255,.8);
    transition:transform .12s ease, box-shadow .15s, filter .15s}
  .ask button:hover{transform:translateY(-1px); filter:brightness(1.15); box-shadow:0 6px 20px -6px rgba(0,82,255,1)}
  .ask button:active{transform:scale(.93)}
  .ask button:disabled{opacity:.5; transform:none}
  .foot{padding:5px 10px 8px; color:var(--faint); font-size:8px; letter-spacing:.03em; text-align:center; -webkit-app-region:no-drag}
  .foot a{color:var(--dim); text-decoration:none}
  /* mini mode — the ─ button folds the pod into a small floating head. Draggable (whole head moves the
     window), with a tiny no-drag ⤢ button to expand (a drag region swallows clicks, so expand needs its own). */
  body.mini .pod{width:116px; height:116px; border-radius:26px; cursor:grab; -webkit-app-region:drag}
  body.mini .pod:active{cursor:grabbing}
  body.mini .head, body.mini .chips, body.mini .ask, body.mini .foot{display:none}
  body.mini .stage::after{display:none}
  /* mini can still SPEAK — a compact bubble overlays the top of the little head (fits inside 116×116).
     Hidden until say() adds .on, so it only appears when Toshi actually has something to say. */
  body.mini .bubble{left:5px; right:31px; top:5px; bottom:auto; max-height:74%; font-size:8.5px; line-height:1.3;
    padding:5px 7px; border-radius:12px; background:rgba(7,11,25,.94); -webkit-app-region:no-drag; z-index:4;
    scrollbar-width:none}
  body.mini .bubble::-webkit-scrollbar{display:none}
  body.mini .bubble .who{display:none}
  .mexp{display:none}
  body.mini .mexp{display:grid; place-items:center; position:absolute; top:5px; right:5px; z-index:5;
    width:22px; height:22px; border-radius:7px; border:1px solid rgba(0,82,255,.4); background:rgba(7,11,25,.75);
    color:#cbd5e1; font-size:12px; line-height:1; cursor:pointer; -webkit-app-region:no-drag; padding:0}
  body.mini .mexp:hover{color:#fff; background:var(--base)}
  @media (prefers-reduced-motion:reduce){ .pod,.dot,.floaty,.spark{animation:none !important} }
</style>
<link rel="stylesheet" href="animations-extra.css" />
<script defer src="animations-extra.js"></script>
</head>
<body>
  <div class="pod" role="application" aria-label="Toshi companion">
    <div class="head">
      <span class="baselogo" title="on Base"></span>
      <span class="logo">TOSHI</span>
      <span class="pose-tag" id="pose-tag">idle</span>
      <button class="x" id="min" title="minimize (Toshi stays)" aria-label="minimize Toshi">─</button>
      <button class="x" id="x" title="quit" aria-label="quit Toshi">✕</button>
    </div>

    <button class="mexp" id="mexp" title="expand" aria-label="expand Toshi">⤢</button>
    <div class="stage">
      <div class="floaty" id="floaty"><canvas id="toshi" width="620" height="820"></canvas></div>
      <div class="loading" id="loading">waking Toshi…</div>
      <div class="bubble" id="bubble"><div class="who">toshi <span class="grounded" id="grounded" hidden>from your repo</span><span class="emote" id="emote" hidden></span><button class="bubble-copy" id="bubble-copy" type="button" title="copy this reply" aria-label="copy Toshi's reply" hidden>⧉</button></div><div id="bubble-body"></div><span class="bubble-more" id="bubble-more" aria-hidden="true">▾</span></div>
    </div>

    <!-- ONE quick chip for the common grounded ask; the input below is the primary path and takes BOTH
         grounded repo questions AND free conversation (chat fallback in lib/session.mjs ask()). -->
    <div class="chips" aria-label="quick asks">
      <button type="button" data-q="what changed?">what's new</button>
    </div>
    <form class="ask" id="ask">
      <input id="q" autocomplete="off" placeholder="talk to Toshi — ask the code, or just chat…" aria-label="talk to Toshi" />
      <button type="submit" id="send">›</button>
    </form>
    <div class="foot"><span id="watching"></span>mascot <a href="https://github.com/tinyhumansai/mascots" target="_blank" rel="noopener">tinyhumans</a> · GPL-3.0 · on zero via MCP</div>
  </div>

<script>
const RIV_URL = 'https://raw.githubusercontent.com/tinyhumansai/mascots/main/mascots/toshi/toshi.riv';
const MCP_ASK = 'http://127.0.0.1:4820/ask'; // the brain (CORS open) — same target from file:// (Electron) or http (dev)
const $ = (id) => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
const rand = (a, b) => a + Math.random() * (b - a);
const pick = (xs) => xs[Math.floor(Math.random() * xs.length)];

/* ── THE OFFICIAL DRIVING API (how openhuman does it — ManifestRiveMascot.tsx) ─────────────────────
 * This mascot is driven by Rive DATA BINDING, not by playing linear animations: the artboard exposes a
 * ViewModel with three enums — pose / eyes / mouthVisemeCode — and "MascotSM" blends transitions
 * internally (no residual bones, no melted body, face always driven). Probed live from toshi.riv:
 *   pose:  idle · look_around · pointing · hand_wave · dancing · celebration · jumping · walking(_side) · running
 *   eyes:  NEUTRAL · blink · look_up/down/left/right · squinting · confused · thinking · closed
 *   mouth: the 15 Oculus viseme codes (sil = resting/closed)
 * Requires @rive-app/canvas ≥ 2.3x (autoBind + viewModelInstance). */
const EYE_CYCLE = ['look_up','look_down','look_left','look_right','blink','squinting','confused','thinking']; // manifest channel
const FLOURISH = ['look_around','pointing','hand_wave','dancing','celebration']; // ambient poses (openhuman-style)
const VISEMES = ['aa','E','ih','oh','ou','PP','DD'];

// Poses that imply Toshi is HOLDING / USING an object. Behind those poses we
// suppress the radial .spark confetti burst (and the heart-burst from the
// footer) — the object's own animation IS the celebration. The rule is
// intentional, not a bug: a burst behind a held prop reads as visual noise.
const OBJECT_POSES = new Set([
  'hand_wave',  // waving a paw
  'pointing',   // pointing at something
  'walking', 'walking_side', 'running', // moving with a prop / in motion
  'dancing',    // often paired with a prop
]);

let rive = null, poseEnum = null, eyesEnum = null, mouthEnum = null, poseTimer = null;
const tag = (t) => { if ($('pose-tag')) $('pose-tag').textContent = t; };
const setEnum = (p, v) => { try { if (p) p.value = v; } catch {} };
// single source of truth for "is Toshi currently holding an object?"
// consulted by sparkle() and by the footer heart-burst. Pure function of
// the current pose enum — no other state to keep in sync.
function poseUsesObject() { return OBJECT_POSES.has(poseEnum && poseEnum.value); }

function setPose(name, label, holdMs, opts) {
  setEnum(poseEnum, name); tag((label || name).replace(/_/g, ' '));
  clearTimeout(poseTimer);
  if (name !== 'idle') poseTimer = setTimeout(() => { setEnum(poseEnum, 'idle'); tag('idle'); }, holdMs || 2600);
  // surface the object-in-hand hint on the stage so the CSS layer can
  // also dim ambient particles (motes) if it ever wants to. No visual
  // effect today — wiring only — but it's the right hook point.
  try { document.querySelector('.stage').dataset.usesObject = OBJECT_POSES.has(name) ? '1' : '0'; } catch {}
}
function celebrate() { setPose('celebration', '🎉 got it', 2800); }
function talk(ms) { // lip-flap via viseme codes; 'sil' closes the mouth at rest
  if (reduce) return;
  let t = 0; const iv = setInterval(() => { setEnum(mouthEnum, pick(VISEMES));
    if ((t += 150) > (ms || 1200)) { clearInterval(iv); setEnum(mouthEnum, 'sil'); } }, 150);
}
function reactWiggle(cls) { const f = $('floaty'); if (reduce || !f) return; f.classList.remove('react','nope'); void f.offsetWidth; f.classList.add(cls); setTimeout(() => f.classList.remove(cls), 480); }
// `sparkle` (the radial .spark confetti burst) is gated on `poseUsesObject()`:
// if Toshi is currently waving / pointing / holding a prop, the burst is
// suppressed — the object's own animation IS the celebration. Callers can
// also pass { force: true } to override the gate (rare; reserved for
// truly event-driven bursts like a successful repo commit pulse).
function sparkle(opts) {
  if (reduce) return; const st = document.querySelector('.stage');
  if (!st) return;
  const force = !!(opts && opts.force);
  if (!force && poseUsesObject()) return; // rule: no confetti behind an in-hand object
  for (let i=0;i<10;i++){ const s=document.createElement('div'); s.className='spark'; const a=Math.random()*6.28, r=40+Math.random()*60;
    s.style.left='50%'; s.style.top='42%'; s.style.setProperty('--dx',Math.cos(a)*r+'px'); s.style.setProperty('--dy',Math.sin(a)*r+'px');
    st.appendChild(s); requestAnimationFrame(()=>s.classList.add('go')); setTimeout(()=>s.remove(),950); }
}

// ambient life, the openhuman way: rest 6–12s → one flourish held 2.5–5s → back to idle. Eyes cycle on the
// manifest cadence (2600ms, random), returning to NEUTRAL between glances so blinks stay momentary.
let busy = false;
function startLife() {
  if (reduce) return;
  (function ambient(){ setTimeout(() => {
    if (!busy && poseEnum && poseEnum.value === 'idle') setPose(pick(FLOURISH), null, rand(2500, 5000));
    ambient(); }, rand(6000, 12000)); })();
  setInterval(() => { if (busy) return; setEnum(eyesEnum, pick(EYE_CYCLE)); setTimeout(() => setEnum(eyesEnum, 'NEUTRAL'), 650); }, 2600);
}

function bootRive() {
  if (!window.rive) { $('loading').textContent = 'rive runtime blocked — needs network'; return; }
  try {
    rive = new window.rive.Rive({
      src: RIV_URL, canvas: $('toshi'), stateMachines: 'MascotSM', autoplay: true, autoBind: true,
      fit: 'contain', alignment: 'center',
      onLoad() {
        $('loading').classList.add('gone');
        try { rive.resizeDrawingSurfaceToCanvas(); } catch {}
        try {
          const vmi = rive.viewModelInstance;
          poseEnum = vmi.enum('pose'); eyesEnum = vmi.enum('eyes'); mouthEnum = vmi.enum('mouthVisemeCode');
          setEnum(eyesEnum, 'NEUTRAL'); setEnum(mouthEnum, 'sil'); // a driven face — no more weird resting expression
        } catch (e) { /* older runtime: mascot still renders on the SM defaults */ }
        setPose('hand_wave', 'hi 👋', 1900); reactWiggle('react'); // greet — the SM blends it cleanly
        startLife();
      },
      onLoadError() { $('loading').textContent = 'could not load Toshi (network)'; },
    });
  } catch { $('loading').textContent = 'rive init failed'; }
}
// debug hooks (pause stops the rAF loop so screenshots can capture)
window.__toshi = {
  pause: () => { try { rive.pause(); } catch {} },
  resume: () => { try { rive.play('MascotSM'); } catch {} },
  state: () => { try { return { pose: poseEnum && poseEnum.value, eyes: eyesEnum && eyesEnum.value, mouth: mouthEnum && mouthEnum.value }; } catch { return null; } },
  setPose: (p, ms) => setPose(p, null, ms),
  say: (t, g, ms) => say(t, g, ms), // debug/self-portrait hook (say is hoisted)
};
window.addEventListener('resize', () => { try { rive && rive.resizeDrawingSurfaceToCanvas(); } catch {} });

let bubbleTimer = null;
// `say` is the single bubble-render path. The spoken answer is ONE block in the user's language
// (EN/FR/ES/DE/IT/PT/NL/RU/ZH/JA/KO/AR/PL/TR/...) — Toshi detects the language from the question and
// the model answers in that language. No bilingual mirror, no EN/FR split, no `\n---\n` divider. The
// bubble auto-scrolls to the bottom on each new answer (so the latest lines are always visible), and
// the user can scroll UP freely with the wheel, touchpad, or the scrollbar to read older content —
// scroll position is preserved when the same answer is re-rendered, and reset when a new answer comes
// in. A small fading chevron at the bottom hints that more content is available above.
function say(text, grounded, holdMs) {
  $('grounded').hidden = !grounded;
  // The bubble now surfaces a little more of the answer's provenance — small, monospace pills in the
  // .who row, same palette. They answer the three things a developer actually wonders after a reply:
  //   • WHICH tool ran (search_graph, trace_call_path, detect_changes, get_architecture, chat, ...)
  //   • WAS the LLM voicing on (✦ rephrased into NL · ≡ raw structural summary, the no-voice path)
  //   • IS this grounded or small talk (the existing 'from your repo' badge stays — we just keep it
  //     for grounded and use 'chat' for free conversation so the two never look the same)
  // The pills are tiny, dim by default, and the .who row still reads as one line in mini mode.
  populateProvenance({ grounded: !!grounded });
  const em = $('emote'); // gif-energy reaction: pops in with the answer
  em.hidden = false; em.textContent = grounded ? pick(['😺', '🎉', '😸', '✨']) : pick(['😺', '💤', '👀']);
  em.style.animation = 'none'; void em.offsetWidth; em.style.animation = ''; // retrigger the pop
  // ONE block in the user's language. The model is now prompted to produce a single-language reply;
  // we still split on `\n---\n` defensively in case a model leaks the legacy bilingual shape — in
  // that case we keep ONLY the first language (the user's one), so the bubble never reads as "EN line
  // then FR line" again. textContent (not innerHTML) so we never render anything the model could
  // turn into HTML.
  const body = $('bubble-body');
  const raw = String(text == null ? '' : text);
  const firstLang = raw.split(/\n\s*---\s*\n/)[0].trim();
  body.textContent = firstLang;
  // stash the plain text on the body so the copy button reads it back without re-splitting
  body.dataset.spoken = firstLang;
  const b = $('bubble'); b.classList.remove('on'); void b.offsetWidth; b.classList.add('on'); // retrigger pop-in
  clearTimeout(bubbleTimer); bubbleTimer = setTimeout(() => b.classList.remove('on'), holdMs || 11000);
  // after the bubble paints, check whether the content overflows the max-height: if so, add a class
  // that fades in a small chevron at the bottom of the bubble so the user knows there is more to scroll.
  // We do this on the next frame so layout is final. We also auto-scroll to the bottom so the latest
  // lines are visible without the user having to scroll — but only when the user is NEAR the bottom
  // (within 40px). If they scrolled up to read older content, we respect that and keep their position
  // (a new answer doesn't yank the view back to the bottom — that was the "le texte continue de
  // défiler vers le bas tout seul" complaint).
  requestAnimationFrame(() => {
    const nearBottom = (b.scrollTop + b.clientHeight) >= (b.scrollHeight - 40);
    if (nearBottom) b.scrollTop = b.scrollHeight; // auto-scroll: only when the user was already at the bottom
    updateOverflowHint();
  });
}

// Last ask response (kept on a closure for the .who row). Updated every time submitQ resolves.
// We surface `tool` (the graph tool that ran) and `voiced` (whether the LLM rephrased the answer).
let lastTool = '';
let lastVoiced = false;
let lastChat = false;
function populateProvenance({ grounded }) {
  const row = document.querySelector('.bubble .who'); if (!row) return;
  // rebuild the small meta pills on every say(): cheap, single-digit children, and it keeps the
  // .who row honest about the *current* answer even if state changed between turns.
  row.querySelectorAll('.meta').forEach((n) => n.remove());
  // tool pill (only when we actually ran a tool — chat fallback has no graph lookup to brag about)
  if (lastTool && lastTool !== 'help') {
    const t = document.createElement('span');
    t.className = 'meta pill pill-tool';
    t.textContent = lastTool; // monospace, dim — names the graph tool that produced the answer
    t.title = `retrieved via ${lastTool}`; // hover: the full name
    row.appendChild(t);
  }
  // voice pill: ✦ (NL rephrased by the LLM) or ≡ (raw structural summary, the no-voice path)
  const v = document.createElement('span');
  v.className = 'meta pill pill-voice' + (lastVoiced ? ' pill-voice-on' : ' pill-voice-off');
  v.textContent = lastVoiced ? '✦ voiced' : '≡ raw';
  v.title = lastVoiced
    ? 'rephrased into natural language by the brain model'
    : 'raw structural summary (no LLM rephrasing — set a model with `toshi model <id>`)';
  row.appendChild(v);
  // grounded vs chat pill (independent of the existing 'from your repo' badge — this one is
  // explicit and stays even when the badge hides for a free-conversation turn)
  if (lastChat) {
    const c = document.createElement('span');
    c.className = 'meta pill pill-chat';
    c.textContent = 'chat';
    c.title = 'small talk — not a repo lookup. Ask "what changed" / "où est X" to ground it.';
    row.appendChild(c);
  } else if (grounded) {
    const g = document.createElement('span');
    g.className = 'meta pill pill-grounded';
    g.textContent = 'from repo';
    g.title = 'answered from your codebase graph';
    row.appendChild(g);
  }
}

// overflow hint + bottom-of-scroll state. .has-more fades the chevron in (the body actually
// overflows the max-height:50%); .at-bottom hides it again when the user has already scrolled to
// the very end — at that point the chevron would be a lie ("more above" but there isn't).
// Cheap: one rAF after paint, reads scrollHeight vs clientHeight on the SCROLLING element (the
// bubble itself — it's the one with overflow:auto, so its scroll metrics are what matter).
function updateOverflowHint() {
  const b = $('bubble'); if (!b) return;
  const over = b.scrollHeight > b.clientHeight + 2; // +2 for sub-pixel rounding
  b.classList.toggle('has-more', over);
  // a body that fits never has more to read; leave scroll alone (the user may have scrolled within
  // a previous long answer and we want to honor that on a follow-up render)
  const atBottom = (b.scrollTop + b.clientHeight) >= (b.scrollHeight - 4);
  b.classList.toggle('at-bottom', atBottom);
}
// re-evaluate on resize (the bubble max-height is %-based, so a pod resize can change overflow)
// AND on scroll: as the user reads older content, the chevron should hide when they reach the end.
window.addEventListener('resize', updateOverflowHint);
$('bubble').addEventListener('scroll', () => {
  const b = $('bubble'); if (!b) return;
  const atBottom = (b.scrollTop + b.clientHeight) >= (b.scrollHeight - 4);
  b.classList.toggle('at-bottom', atBottom);
}, { passive: true });
function thinking() { $('grounded').hidden = true; $('bubble-body').innerHTML = '<span class="dots"><span>•</span><span>•</span><span>•</span></span>'; $('bubble').classList.add('on'); }

async function submitQ(q) {
  if (!q || busy) return;
  $('q').value=''; $('send').disabled=true; busy = true;
  setPose('look_around', 'thinking', 15000); setEnum(eyesEnum, 'thinking'); reactWiggle('react'); thinking();
  // clear provenance + copy state for the new turn (a new answer deserves a clean header)
  lastTool = ''; lastVoiced = false; lastChat = false;
  const cp = $('bubble-copy'); if (cp) { cp.hidden = true; cp.classList.remove('copied'); }
  try {
    const r = await fetch(MCP_ASK, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ q }) });
    if (!r.ok) throw new Error('mcp '+r.status);
    const j = await r.json();
    setEnum(eyesEnum, 'NEUTRAL');
    // capture provenance BEFORE say() — populateProvenance() reads from these closures
    lastTool = j.tool || ''; lastVoiced = !!j.voiced; lastChat = !!j.chat;
    // grounded → celebrate; free chat → a warm wave (it's a normal conversation, not a repo fact); the
    // bare abilities greeting → a gentle "heads-up" point.
    if (j.grounded) { celebrate(); sparkle(); }
    else if (j.chat) { setPose('hand_wave', '😺', 2200); reactWiggle('react'); }
    else { setPose('pointing', 'heads-up', 2200); }
    const text = j.spoken || j.answer || '(no answer)'; // voiced when available, structural/chat otherwise
    talk(Math.min(2600, text.length*22)); say(text, !!j.grounded, Math.max(9000, Math.min(20000, text.length*90)));
    // reveal the copy button once we have something to copy (the body is the source of truth, and
    // it is stashed on body.dataset.spoken by say())
    if (cp) cp.hidden = false;
  } catch {
    setEnum(eyesEnum, 'confused'); setTimeout(() => setEnum(eyesEnum, 'NEUTRAL'), 1200);
    setPose('idle'); reactWiggle('nope');
    say("start my brain first:\n  node mcp/toshi-mcp.mjs\nthen I read your real session (via codebase-memory-mcp).", false);
    if (cp) cp.hidden = true; // nothing to copy from a brain-down banner
  }
  busy = false; $('send').disabled=false; $('q').focus();
}
// copy button — pulls the stashed plain text (EN\n\nFR — the same thing the user sees) into the clipboard.
// Uses the modern Clipboard API when available (Electron + secure contexts); falls back to execCommand on
// plain http://127.0.0.1 which is treated as an insecure context by some browsers.
$('bubble-copy').addEventListener('click', async (e) => {
  e.stopPropagation();
  const body = $('bubble-body'); if (!body) return;
  const txt = body.dataset.spoken || body.textContent || '';
  if (!txt) return;
  let ok = false;
  try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(txt); ok = true; } } catch {}
  if (!ok) { // insecure-context fallback (file:// or http on some browsers) — the classic exec path
    try { const ta = document.createElement('textarea'); ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); ok = document.execCommand('copy'); document.body.removeChild(ta); } catch {}
  }
  const btn = $('bubble-copy'); if (!btn) return;
  btn.classList.toggle('copied', ok); // flips the icon to ✓ for ~1.2s, then reverts
  btn.title = ok ? 'copied!' : 'copy failed — select the bubble text';
  setTimeout(() => { btn.classList.remove('copied'); btn.title = 'copy this reply'; }, 1200);
});
$('ask').addEventListener('submit', (e) => { e.preventDefault(); submitQ($('q').value.trim()); });
// quick chips: one tap = a real ask; "trouve…" pre-fills so you type just the symbol
document.querySelectorAll('.chips button').forEach((b) => b.addEventListener('click', () => {
  if (b.dataset.fill) { $('q').value = b.dataset.fill; $('q').focus(); return; }
  submitQ(b.dataset.q);
}));

// pet the cat: click the mascot → a little flourish + a short companion quip (local, no tokens)
const QUIPS = [
  (r) => `keeping an eye on ${r} 👀`, () => 'remember to commit 😼', () => 'stay hydrated, dev 💧',
  () => 'small commits > big regrets', (r) => `${r} is looking good`, () => 'ship it 🚀',
  () => 'one more test, one less bug', () => 'prr prr',
];
document.querySelector('.stage').addEventListener('click', () => {
  if (collapsed) { setCollapsed(false); return; } // mini head → click to expand
  if (busy) return;
  setPose(pick(['dancing','jumping','celebration','hand_wave']), '😺', 2200); reactWiggle('react');
  say(pick(QUIPS)(watching || 'your repo'), false, 4500);
});

// ── minimize without quitting + summon from any terminal (`toshi show|hide|toggle`) ────────────────
let collapsed = false;
const desk = () => window.toshiDesktop; // present in Electron (preload), absent in a plain browser
function setCollapsed(on) {
  collapsed = on; document.body.classList.add('no-anim'); document.body.classList.toggle('mini', on);
  try { desk() && desk()[on ? 'collapse' : 'expand'](); } catch {}
  setTimeout(() => { try { rive && rive.resizeDrawingSurfaceToCanvas(); } catch {} document.body.classList.remove('no-anim'); }, 380);
  // mini can talk now — greet on fold so you see the bubble works; expanding clears it
  if (on) setTimeout(() => say(pick(MINI_HELLOS)(watching || 'your repo'), false, 4200), 420);
  else { const b = $('bubble'); if (b) b.classList.remove('on'); }
}
// short things Toshi says from the little head (local, no tokens) — pulse comments still show here too
const MINI_HELLOS = [
  (r) => `👀 watching ${r}`, () => 'still here 😺', () => 'tap ⤢ to open me', (r) => `${r} looks good`, () => 'prr prr 🐾',
];
// every few minutes while minimized & idle, a tiny quip so the mini head feels alive (pulse handles real events)
setInterval(() => { if (collapsed && !busy && !document.hidden) say(pick(MINI_HELLOS)(watching || 'your repo'), false, 4000); }, 210000);
$('min').addEventListener('click', (e) => { e.stopPropagation(); setCollapsed(true); });
$('mexp').addEventListener('click', (e) => { e.stopPropagation(); setCollapsed(false); }); // no-drag expand in mini mode
function runPanelCmd(cmd, size) {
  if (!cmd) return;
  if (cmd === 'collapse') setCollapsed(true);
  else if (cmd === 'expand') setCollapsed(false);
  else if (cmd === 'hide') { try { desk() && desk().hide(); } catch {} }
  else if (cmd === 'show') { setCollapsed(false); try { desk() && desk().show(); } catch {} setPose('hand_wave', '😺', 1800); }
  else if (cmd === 'toggle') runPanelCmd(document.hidden ? 'show' : 'hide');
  else if (cmd === 'resize' && size) { try { desk() && desk().resize(size.w, size.h); } catch {} }
}

// companion pulse: every 2.5 min ask the brain for a kind, grounded comment about the session —
// it only speaks on REAL new events (a fresh commit, files starting to move) or a rare gentle hello.
let lastPulse = '';
setInterval(async () => {
  if (busy || document.hidden) return;
  try {
    const p = await (await fetch('http://127.0.0.1:4820/pulse')).json();
    if (p.comment && p.comment !== lastPulse) {
      lastPulse = p.comment;
      setPose(p.event === 'commit' ? 'celebration' : 'hand_wave', p.event === 'commit' ? '🎉' : '😺', 2600);
      reactWiggle('react'); if (p.event === 'commit') sparkle({ force: true }); // commit = real event, burst regardless of pose
      say(p.comment, true, 9500);
    }
  } catch {}
}, 150000);
$('x').addEventListener('click', () => { try { window.close(); } catch {} document.querySelector('.pod').style.display='none'; });

// Stay connected to the user's terminal: poll the brain for the repo it watches. When `toshi` is run in
// another terminal (POST /repo), the footer updates and Toshi announces the switch — visibly connected.
let watching = '';
async function pollWatching() {
  try {
    const j = await (await fetch('http://127.0.0.1:4820/health?w=1')).json(); // ?w=1 = "a popup window is alive"
    runPanelCmd(j.panelCmd, j.panelSize); // one-shot window verb queued by the `toshi` CLI
    const base = String(j.repo || '').split(/[\\/]/).filter(Boolean).pop() || '';
    if (base && base !== watching) {
      const first = !watching; watching = base;
      const el = $('watching'); el.textContent = `watching ${base} · `; el.style.color = 'var(--teal)';
      if (!first) { say(`👀 now watching ${base}`, false, 5000); setPose('hand_wave', '👀 ' + base, 1900); }
    }
  } catch { const el = $('watching'); if (el) el.textContent = ''; watching = ''; }
}
setInterval(pollWatching, 4000); pollWatching();

bootRive();
</script>
</body>
