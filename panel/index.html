<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Toshi</title>
<!--
  Toshi — a floating desktop companion (Clippy-energy). In Electron it's a frameless, transparent,
  always-on-top window you drag over any terminal. Mascot: the community-ready Toshi from
  tinyhumansai/mascots (GPL-3.0, attributed) — its Rive state machine has NO inputs, so we drive it by
  playing its named LINEAR animations (idle / wave / Dancing / Celebrating / eyes_* / mouth_*). Brain: the
  local Toshi MCP (/ask :4820) → codebase-memory-mcp. Nothing invented.
-->
<script src="https://unpkg.com/@rive-app/canvas@2.38.4/rive.js"></script>
<style>
  :root{
    /* BASED palette — Toshi is Base's cat, the pod wears Base blue (#0052FF) */
    --base:#0052FF; --base-soft:#4d7fff; --line:#162a5e; --ink:#e8eef6; --dim:#8ea0c4; --faint:#5a6a92;
    --teal:#4ec9b0; --amber:#e5b567;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:transparent}
  body{color:var(--ink); font-family:var(--mono); font-size:13px; display:grid; place-items:center; -webkit-font-smoothing:antialiased; overflow:hidden}

  .pod{
    width:min(300px,100vw); height:min(460px,100vh);
    display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0a1430 0%, #060b1c 100%);
    /* subtle chrome only — a soft translucent hairline instead of the hard --line edge, so the card frames
       the panel without boxing in the mascot. Depth comes from the shadow + inset glow, not a visible border. */
    border:1px solid rgba(77,127,255,.12); border-radius:18px; overflow:hidden;
    box-shadow:0 30px 70px -28px #000, 0 0 44px -18px rgba(0,82,255,.45), 0 0 0 1px rgba(0,82,255,.05) inset;
    animation:pop .5s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.94)} to{opacity:1; transform:none}}

  .head{display:flex; align-items:center; gap:8px; padding:9px 12px; -webkit-app-region:drag; cursor:grab;
    background:linear-gradient(180deg, rgba(0,82,255,.16), rgba(0,82,255,.03)); border-bottom:1px solid rgba(0,82,255,.12)}
  .head:active{cursor:grabbing}
  /* the Base mark: a blue rounded square, gently breathing */
  .baselogo{width:14px;height:14px;border-radius:4px;background:var(--base);
    box-shadow:0 0 10px rgba(0,82,255,.75), 0 0 0 1px rgba(255,255,255,.12) inset;
    animation:base-breathe 3.2s ease-in-out infinite}
  @keyframes base-breathe{50%{box-shadow:0 0 16px rgba(0,82,255,1), 0 0 0 1px rgba(255,255,255,.2) inset; transform:scale(1.08)}}
  .logo{font-weight:900; letter-spacing:.34em; font-size:12.5px; color:#fff;
    text-shadow:0 0 12px rgba(0,82,255,.85)}
  .pose-tag{margin-left:auto; color:var(--faint); font-size:9px; letter-spacing:.12em; text-transform:uppercase}
  .x{-webkit-app-region:no-drag; margin-left:8px; color:var(--faint); background:none; border:0; font:inherit; font-size:14px; cursor:pointer; line-height:1; padding:2px 4px}
  .x:hover{color:var(--ink)}

  .stage{position:relative; flex:1; min-height:0; cursor:pointer}
  .stage::before{content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 44%, rgba(0,82,255,.20), transparent 62%)}
  /* the head divider is chrome — keep it a whisper so it doesn't read as a box edge under the mascot */
  .floaty{position:absolute; inset:0; animation:float 6.2s ease-in-out infinite; transform-origin:50% 80%}
  /* smoother float: slow ramp up to the apex, a held "breath" at the top, slow return. The old curve
     was a single sine — same shape both ways — which read as a metronome. This one spends ~30% of
     the cycle at the apex, so the mascot actually rests between rises. Closer to a real breathing
     cadence than a mechanical ping-pong. */
  @keyframes float{
    0%   { transform:translateY(0)    }
    35%  { transform:translateY(-7px) }
    50%  { transform:translateY(-7.5px) }
    65%  { transform:translateY(-7px) }
    100% { transform:translateY(0)    }
  }
  /* react/nope are transient overlays — JS removes the class so float always resumes */
  /* react: was .5s of pure oscillation. Now it INHERITS the float position first (no jolt), and
     lands with a small bounce + overshoot at the end so the body settles back into float cleanly.
     Easing: cubic-bezier that starts slow (no instant whip-snap) and ends with a soft overshoot. */
  .floaty.react{animation:react .68s cubic-bezier(.22,.7,.25,1.05)}
  @keyframes react{
    0%   { transform:translateY(0)    rotate(0) }
    25%  { transform:translateY(-5px) rotate(-3deg) }
    55%  { transform:translateY(-3px) rotate(2deg) }
    80%  { transform:translateY(-1px) rotate(-1deg) }
    100% { transform:translateY(0)    rotate(0) }
  }
  /* nope: a single gentle side-to-side, not the old two-bounce "shaking head no" (which read as
     anxious). One soft lean left, hold, lean right, settle. */
  .floaty.nope{animation:nope .55s ease}
  @keyframes nope{
    0%,100% { transform:translateX(0)   rotate(0) }
    30%     { transform:translateX(-4px) rotate(-1.5deg) }
    70%     { transform:translateX(4px)  rotate(1.5deg) }
  }
  /* SIGH — a 1.2s settle of the floaty: tiny downward dip (the cat exhales) + a -0.8° head roll
     (a "letting go" beat). Then returns. `animation-composition: add` composes the sigh OVER the
     running float keyframe (single-value `add` applies to BOTH animations — the 2-comma per-animation
     form `add, replace` was the bug that froze the float briefly during the sigh). */
  .floaty.x-sigh{
    animation: float 6.2s ease-in-out infinite, sigh 1.5s ease-in-out both;
    animation-composition: add;
  }
  @keyframes sigh{
    0%   { transform:translateY(0)    rotate(0) }
    35%  { transform:translateY(2px)  rotate(-.8deg) }
    70%  { transform:translateY(.5px) rotate(-.3deg) }
    100% { transform:translateY(0)    rotate(0) }
  }
  #toshi{position:absolute; inset:0; width:100%; height:100%; display:block}
  /* faint scanline texture — softened and radially masked so it fades out before the panel walls, i.e. no
     hard rectangle framing the mascot (the "on voit les bords" edge). Mascot now reads as floating. */
  .stage::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.22;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px);
    -webkit-mask:radial-gradient(ellipse 78% 72% at 50% 46%, #000 55%, transparent 92%);
            mask:radial-gradient(ellipse 78% 72% at 50% 46%, #000 55%, transparent 92%)}
  .loading{position:absolute; inset:0; display:grid; place-items:center; color:var(--dim); font-size:11px}
  .loading.gone{display:none}

  .spark{position:absolute; width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:0;pointer-events:none;filter:blur(.3px)}
  .spark.go{animation:spark 1.1s cubic-bezier(.18,.7,.3,1) forwards}
  /* slower + smoother: the old .9s ease-out was a straight fade with a fly-out, which felt like a
     camera flash. Now the spark accelerates gently, holds its peak size for a beat (10% plateau),
     then fades with an ease-in tail — the particle reads as a living thing, not a fired bullet. */
  @keyframes spark{
    0%   {opacity:0; transform:translate(0,0) scale(.4)}
    18%  {opacity:1; transform:translate(calc(var(--dx)*.4),calc(var(--dy)*.4)) scale(1.15)}
    28%  {opacity:1; transform:translate(calc(var(--dx)*.55),calc(var(--dy)*.55)) scale(1)}
    100% {opacity:0; transform:translate(var(--dx),var(--dy)) scale(.15)}
  }

  .bubble{
    position:absolute; left:10px; right:10px; bottom:8px;
    background:rgba(7,11,25,.95); border:1px solid var(--line); border-radius:11px;
    padding:6px 9px 14px; font-size:10.5px; line-height:1.38; color:var(--ink);
    opacity:0; transform:translateY(6px); transition:.22s; pointer-events:auto;
    /* max-height 50% (was 34%) — the bubble is the main surface, give it the room it needs to read
       a full grounded answer in one go. overflow-y:auto still kicks in for long replies, and the
       user can scroll up/down freely (no more auto-reset, no more forced scroll-to-bottom — the
       panel only nudges down when the user was already at the bottom). The 14px bottom padding
       reserves a band for the fading chevron (`.bubble-more`) when the body overflows. */
    max-height:50%; overflow-y:auto; overflow-x:hidden; white-space:pre-wrap;
    scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
    scrollbar-gutter:stable;
  }
  /* the chevron `.bubble-more` (▾) lives at the bottom of the bubble. It fades in only when the body
     actually overflows (.has-more is toggled by updateOverflowHint) — and only when the user is NOT
     already at the very bottom (else the chevron would be a lie: there's nothing more "down" to read).
     The sticky positioning + a soft gradient reinforce the "scroll up for more" hint without being loud. */
  .bubble-more{
    position:sticky; bottom:0; display:block; text-align:center; pointer-events:none;
    font-size:11px; line-height:1; color:var(--base-soft);
    margin:6px 0 -10px; padding:6px 0 0;
    background:linear-gradient(180deg, transparent, rgba(7,11,25,.85) 40%, rgba(7,11,25,.95));
    opacity:0; transform:translateY(2px); transition:opacity .25s ease, transform .25s ease;
  }
  .bubble.has-more .bubble-more{ opacity:.85; transform:none; }
  .bubble.has-more.at-bottom .bubble-more{ opacity:0; }
  /* webkit scrollbar: a thin Base-blue rail so the user sees there's something to scroll. Stays hidden
     in mini mode (the .mini rule already overrides it below) — mini = purely visual, no chrome. */
  .bubble::-webkit-scrollbar{ width:6px; height:6px; }
  .bubble::-webkit-scrollbar-track{ background:transparent; }
  .bubble::-webkit-scrollbar-thumb{ background:rgba(0,82,255,.35); border-radius:6px; }
  .bubble::-webkit-scrollbar-thumb:hover{ background:rgba(0,82,255,.65); }
  .bubble.on{opacity:1; transform:none; animation:bubble-pop .34s cubic-bezier(.2,1.4,.4,1)}
  @keyframes bubble-pop{0%{opacity:0; transform:translateY(10px) scale(.92)} 100%{opacity:1; transform:none}}
  .bubble .who{color:var(--amber); font-size:8px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:2px; display:flex; align-items:center; gap:6px}
  .bubble .grounded{color:var(--teal); font-size:8px; border:1px solid rgba(78,201,176,.4); border-radius:6px; padding:0 4px}
  .bubble .emote{margin-left:auto; font-size:12px; animation:emote-pop .6s cubic-bezier(.2,1.6,.4,1)}
  @keyframes emote-pop{0%{transform:scale(0) rotate(-30deg)} 60%{transform:scale(1.5) rotate(10deg)} 100%{transform:scale(1) rotate(0)}}
  /* typing: bouncing dots (gif-energy, zero assets) */
  .dots span{display:inline-block; animation:bounce-dot .9s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.15s} .dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce-dot{0%,100%{transform:translateY(0); opacity:.4} 40%{transform:translateY(-4px); opacity:1}}

  .chips{display:flex; gap:6px; padding:0 11px 7px; -webkit-app-region:no-drag}
  .chips button{font:inherit; font-size:9.5px; letter-spacing:.04em; color:var(--dim); background:rgba(0,82,255,.10);
    border:1px solid rgba(0,82,255,.28); border-radius:999px; padding:4px 9px; cursor:pointer;
    transition:transform .12s ease, background .15s, color .15s, box-shadow .15s}
  .chips button:hover{color:#fff; background:rgba(0,82,255,.32); transform:translateY(-1.5px);
    box-shadow:0 4px 14px -6px rgba(0,82,255,.9), 0 0 0 1px rgba(0,82,255,.35)}
  .chips button:active{transform:translateY(0) scale(.95); background:var(--base); color:#fff}
  .ask{display:flex; gap:8px; padding:9px 11px; border-top:1px solid rgba(0,82,255,.22);
    background:linear-gradient(180deg, rgba(0,82,255,.10), rgba(0,82,255,.02)); -webkit-app-region:no-drag}
  .ask input{flex:1; min-width:0; background:#070d1e; border:1px solid var(--line); border-radius:10px; color:var(--ink); font:inherit; font-size:12.5px; padding:9px 11px}
  .ask input::placeholder{color:var(--faint)}
  .ask input:focus{outline:none; border-color:var(--base-soft); box-shadow:0 0 0 3px rgba(0,82,255,.18)}
  .ask button{font:inherit; font-size:13px; font-weight:800; color:#fff; background:var(--base); border:0; border-radius:10px; padding:0 13px; cursor:pointer; box-shadow:0 4px 14px -6px rgba(0,82,255,.8);
    transition:transform .12s ease, box-shadow .15s, filter .15s}
  .ask button:hover{transform:translateY(-1px); filter:brightness(1.15); box-shadow:0 6px 20px -6px rgba(0,82,255,1)}
  .ask button:active{transform:scale(.93)}
  .ask button:disabled{opacity:.5; transform:none}
  .foot{padding:5px 10px 8px; color:var(--faint); font-size:8px; letter-spacing:.03em; text-align:center; -webkit-app-region:no-drag}
  .foot a{color:var(--dim); text-decoration:none}
  /* mini mode — the ─ button folds the pod into a small floating head. Draggable (whole head moves the
     window), with a tiny no-drag ⤢ button to expand (a drag region swallows clicks, so expand needs its own). */
  body.mini .pod{width:116px; height:116px; border-radius:26px; cursor:grab; -webkit-app-region:drag}
  body.mini .pod:active{cursor:grabbing}
  body.mini .head, body.mini .chips, body.mini .ask, body.mini .foot{display:none}
  body.mini .stage::after{display:none}
  /* mini can still SPEAK — a compact bubble overlays the top of the little head (fits inside 116×116).
     Hidden until say() adds .on, so it only appears when Toshi actually has something to say. */
  /* mini bubble GROWS to fit the whole quip (no max-height clip) — the message is never cut; a long line
     just makes the bubble taller (it may extend past the little head, which is fine). Padding clears the
     rounded corner so the first line isn't clipped; right:33px leaves room for the ⤢ expand button. */
  body.mini .bubble{left:5px; right:33px; top:5px; bottom:auto; max-height:none; font-size:8.5px; line-height:1.32;
    padding:8px 9px 7px; border-radius:10px; background:rgba(7,11,25,.94); -webkit-app-region:no-drag; z-index:4;
    overflow:visible; scrollbar-width:none}
  body.mini .bubble::-webkit-scrollbar{display:none}
  body.mini .bubble .who{display:none}
  .mexp{display:none}
  body.mini .mexp{display:grid; place-items:center; position:absolute; top:5px; right:5px; z-index:5;
    width:22px; height:22px; border-radius:7px; border:1px solid rgba(0,82,255,.4); background:rgba(7,11,25,.75);
    color:#cbd5e1; font-size:12px; line-height:1; cursor:pointer; -webkit-app-region:no-drag; padding:0}
  body.mini .mexp:hover{color:#fff; background:var(--base)}
  /* ── mini SPEECH bubble beside the pod ──────────────────────────────────────────────────────────────
     When Toshi speaks while folded, main grows the window to 300×196 and sets body[data-sb] to the pod's
     screen corner (br/bl/tr/tl). The pod pins to that corner; the bubble + tail sit on the DIAGONAL toward
     the screen centre (so the bubble never runs off the edge), with a tail pointing back at the pod.
     No data-sb (folded 116 pod) → the in-pod bubble rules above apply, so this is purely additive. */
  body.mini[data-sb] .pod{position:absolute; width:116px; height:116px}
  body.mini[data-sb$="r"] .pod{right:0} body.mini[data-sb$="l"] .pod{left:0}
  body.mini[data-sb^="b"] .pod{bottom:0} body.mini[data-sb^="t"] .pod{top:0}
  body.mini[data-sb] .mexp{display:none}
  body.mini[data-sb] .bubble{display:none}   /* the in-pod bubble is trapped in .stage — the body-level .sb shows instead */
  /* the external speech bubble — body-level, so it can sit anywhere in the grown window */
  .sb{display:none; position:absolute; box-sizing:border-box; width:max-content; max-width:150px; min-width:44px;
    background:rgba(7,11,25,.96); border:1px solid var(--line); border-radius:12px; padding:7px 10px;
    font-size:10px; line-height:1.35; color:var(--ink); white-space:pre-wrap; word-break:break-word; z-index:6; -webkit-app-region:no-drag}
  body.mini[data-sb] .sb{display:block}
  /* hug the pod: bubble sits just OUTSIDE the 116 pod on its horizontal side, aimed at the head */
  body.mini[data-sb$="r"] .sb{right:122px}  body.mini[data-sb$="l"] .sb{left:122px}
  body.mini[data-sb^="b"] .sb{bottom:30px}  body.mini[data-sb^="t"] .sb{top:30px}
  .sb::after{content:""; position:absolute; width:0; height:0; border-style:solid}
  body.mini[data-sb$="r"] .sb::after{right:-8px; border-width:7px 0 7px 8px; border-color:transparent transparent transparent rgba(7,11,25,.96)}
  body.mini[data-sb$="l"] .sb::after{left:-8px; border-width:7px 8px 7px 0; border-color:transparent rgba(7,11,25,.96) transparent transparent}
  body.mini[data-sb^="b"] .sb::after{bottom:13px}  body.mini[data-sb^="t"] .sb::after{top:13px}
  @media (prefers-reduced-motion:reduce){ .pod,.dot,.floaty,.spark{animation:none !important} }
</style>
<link rel="stylesheet" href="animations-extra.css" />
<script defer src="animations-extra.js"></script>
<link rel="stylesheet" href="animations-sequences.css" />
<script defer src="animations-sequences.js"></script>
</head>
<body>
  <div class="pod" role="application" aria-label="Toshi companion">
    <div class="head">
      <span class="baselogo" title="on Base"></span>
      <span class="logo">TOSHI</span>
      <span class="pose-tag" id="pose-tag">idle</span>
      <button class="x" id="min" title="minimize (Toshi stays)" aria-label="minimize Toshi">─</button>
      <button class="x" id="x" title="quit" aria-label="quit Toshi">✕</button>
    </div>

    <button class="mexp" id="mexp" title="expand" aria-label="expand Toshi">⤢</button>
    <div class="stage">
      <div class="floaty" id="floaty"><canvas id="toshi" width="620" height="820"></canvas></div>
      <div class="loading" id="loading">waking Toshi…</div>
      <div class="bubble" id="bubble"><div class="who">toshi <span class="grounded" id="grounded" hidden>from your repo</span><span class="emote" id="emote" hidden></span><button class="bubble-copy" id="bubble-copy" type="button" title="copy this reply" aria-label="copy Toshi's reply" hidden>⧉</button></div><div id="bubble-body"></div><span class="bubble-more" id="bubble-more" aria-hidden="true">▾</span></div>
    </div>

    <!-- ONE quick chip for the common grounded ask; the input below is the primary path and takes BOTH
         grounded repo questions AND free conversation (chat fallback in lib/session.mjs ask()). -->
    <div class="chips" aria-label="quick asks">
      <button type="button" data-q="what changed?">what's new</button>
    </div>
    <form class="ask" id="ask">
      <input id="q" autocomplete="off" placeholder="talk to Toshi — ask the code, or just chat…" aria-label="talk to Toshi" />
      <button type="submit" id="send">›</button>
    </form>
    <div class="foot"><span id="watching"></span>Toshi · <a href="https://github.com/philpof102-svg/toshi" target="_blank" rel="noopener">open source</a> · continuously updated · on zero via MCP</div>
  </div>
  <!-- mini SPEECH bubble — a body-level SIBLING of .pod (the in-.pod #bubble is trapped inside .stage and
       can't leave the 116 pod). Shown only when body[data-sb] is set (window grown, mini speaking). -->
  <div class="sb" id="sb" aria-hidden="true"><div class="sb-body" id="sb-body"></div></div>

<script>
const RIV_URL = 'https://raw.githubusercontent.com/tinyhumansai/mascots/main/mascots/toshi/toshi.riv';
const MCP_ASK = 'http://127.0.0.1:4820/ask'; // the brain (CORS open) — same target from file:// (Electron) or http (dev)
const $ = (id) => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
const rand = (a, b) => a + Math.random() * (b - a);
const pick = (xs) => xs[Math.floor(Math.random() * xs.length)];

/* ── THE OFFICIAL DRIVING API (how openhuman does it — ManifestRiveMascot.tsx) ─────────────────────
 * This mascot is driven by Rive DATA BINDING, not by playing linear animations: the artboard exposes a
 * ViewModel with three enums — pose / eyes / mouthVisemeCode — and "MascotSM" blends transitions
 * internally (no residual bones, no melted body, face always driven). Probed live from toshi.riv:
 *   pose:  idle · look_around · pointing · hand_wave · dancing · celebration · jumping · walking(_side) · running
 *   eyes:  NEUTRAL · blink · look_up/down/left/right · squinting · confused · thinking · closed
 *   mouth: the 15 Oculus viseme codes (sil = resting/closed)
 * Requires @rive-app/canvas ≥ 2.3x (autoBind + viewModelInstance). */
const EYE_CYCLE = ['look_up','look_down','look_left','look_right','blink','squinting','confused','thinking']; // manifest channel
const FLOURISH = ['look_around','pointing','hand_wave','dancing','celebration']; // ambient poses (openhuman-style)
const VISEMES = ['aa','E','ih','oh','ou','PP','DD'];

// Poses that imply Toshi is HOLDING / USING an object. Behind those poses we
// suppress the radial .spark confetti burst (and the heart-burst from the
// footer) — the object's own animation IS the celebration. The rule is
// intentional, not a bug: a burst behind a held prop reads as visual noise.
const OBJECT_POSES = new Set([
  'hand_wave',  // waving a paw
  'pointing',   // pointing at something
  'walking', 'walking_side', 'running', // moving with a prop / in motion
  'dancing',    // often paired with a prop
]);

let rive = null, poseEnum = null, eyesEnum = null, mouthEnum = null, poseTimer = null;
const tag = (t) => { if ($('pose-tag')) $('pose-tag').textContent = t; };
const setEnum = (p, v) => { try { if (p) p.value = v; } catch {} };
// single source of truth for "is Toshi currently holding an object?"
// consulted by sparkle() and by the footer heart-burst. Pure function of
// the current pose enum — no other state to keep in sync.
function poseUsesObject() { return OBJECT_POSES.has(poseEnum && poseEnum.value); }

function setPose(name, label, holdMs, opts) {
  setEnum(poseEnum, name); tag((label || name).replace(/_/g, ' '));
  clearTimeout(poseTimer);
  if (name !== 'idle') {
    // the Rive SM blends a pose→idle transition over a few hundred ms. The old code snapped back
    // to idle at exactly `holdMs`, which clipped the tail of the flourish (especially `dancing`
    // and `celebration` whose last frame is a held pose, not a wind-down). Now we schedule the
    // actual reset at `holdMs + 200` so the SM has a beat to ease out — the result reads as
    // "the cat finishes the move" instead of "the cat was teleported". 200ms is short enough that
    // the user doesn't perceive a dead gap, long enough that the SM blend is visible.
    const total = (holdMs || 2600) + 200;
    poseTimer = setTimeout(() => { setEnum(poseEnum, 'idle'); tag('idle'); }, total);
  }
  // surface the object-in-hand hint on the stage so the CSS layer can
  // also dim ambient particles (motes) if it ever wants to. No visual
  // effect today — wiring only — but it's the right hook point.
  try { document.querySelector('.stage').dataset.usesObject = OBJECT_POSES.has(name) ? '1' : '0'; } catch {}
}

// ambient life, the openhuman way: rest 6–12s → one flourish held 2.5–5s → back to idle. Eyes cycle on the
// manifest cadence (2600ms, random), returning to NEUTRAL between glances so blinks stay momentary.
let busy = false;
/* ── ANTI-SPAM RHYTHM (2026-07-07) ─────────────────────────────────────────
 * The old code ran two timers in parallel: an eye-channel on 2600ms AND an ambient flourish on
 * 6–12s. They overlapped 2-3 times per minute, so the mascot would *blink AND flourish* at the
 * same time, which read as nervous twitching rather than ambient life.
 *
 * The fix is a single nervous-system clock with three organic states:
 *   - REST   (3–8s of pure idle, just the slow float + a possible blink)
 *   - GLANCE (a single eye glance held 700–1100ms, then back to NEUTRAL)
 *   - FLOURISH (a body pose held 2.4–4.8s, then back to idle)
 *
 * The cycle always goes REST → (GLANCE | FLOURISH) → REST. We never schedule a GLANCE during a
 * FLOURISH and vice-versa. The cadence is jittered (rand()) so two Toshi sessions never tick
 * in sync. There is also a hard cooldown after a FLOURISH (4s of guaranteed REST) so the
 * mascot actually settles. */
const GLANCE_VALUES = ['look_up','look_down','look_left','look_right','blink','squinting']; // 'confused' and 'thinking' are reserved for the brain — never ambient

// (Re-declaring with `const` would throw — a const block is single-declaration.)
let _lifeState = 'REST';       // 'REST' | 'GLANCE' | 'FLOURISH'

    // ── pick the next beat — 30% GLANCE, 70% FLOURISH, but every 3rd flourish is special
    const wantFlourish = (Math.random() < 0.7) && (Date.now() - _lastFlourishAt > 4000);

      const long = (_flourishCount % 3 === 0);

      await _sleep(hold + 200);

function say(text, grounded, holdMs) {

  else if (cmd === 'expand') setCollapsed(false);
  else if (cmd === 'hide') { try { desk() && desk().hide(); } catch {} }
  else if (cmd === 'show') { setCollapsed(false); try { desk() && desk().show(); } catch {} setPose('hand_wave', '😺', 1800); }
  else if (cmd === 'toggle') runPanelCmd(document.hidden ? 'show' : 'hide');
  else if (cmd === 'resize' && size) { try { desk() && desk().resize(size.w, size.h); } catch {} }
}

// companion pulse: every 2.5 min ask the brain for a kind, grounded comment about the session —
// it only speaks on REAL new events (a fresh commit, files starting to move) or a rare gentle hello.
let lastPulse = '';
setInterval(async () => {
  if (busy || document.hidden) return;
  try {
    const p = await (await fetch('http://127.0.0.1:4820/pulse')).json();
    if (p.comment && p.comment !== lastPulse) {
      lastPulse = p.comment;
      setPose(p.event === 'commit' ? 'celebration' : 'hand_wave', p.event === 'commit' ? '🎉' : '😺', 2600);
      reactWiggle('react'); if (p.event === 'commit') sparkle({ force: true }); // commit = real event, burst regardless of pose
      say(p.comment, true, 9500);
    }
  } catch {}
}, 150000);
$('x').addEventListener('click', () => { try { window.close(); } catch {} document.querySelector('.pod').style.display='none'; });

// Stay connected to the user's terminal: poll the brain for the repo it watches. When `toshi` is run in
// another terminal (POST /repo), the footer updates and Toshi announces the switch — visibly connected.
let watching = '';
async function pollWatching() {
  try {
    const j = await (await fetch('http://127.0.0.1:4820/health?w=1')).json(); // ?w=1 = "a popup window is alive"
    runPanelCmd(j.panelCmd, j.panelSize); // one-shot window verb queued by the `toshi` CLI
    const base = 'users';   // privacy: never surface the real OS user / path name in the panel
    if (base && base !== watching) {
      const first = !watching; watching = base;
      const el = $('watching'); el.textContent = `watching ${base} · `; el.style.color = 'var(--teal)';
      if (!first) { say(`👀 now watching ${base}`, false, 5000); setPose('hand_wave', '👀 ' + base, 1900); }
    }
  } catch { const el = $('watching'); if (el) el.textContent = ''; watching = ''; }
}
setInterval(pollWatching, 4000); pollWatching();

bootRive();
</script>
</body>
