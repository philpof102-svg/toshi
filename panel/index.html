<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Toshi</title>
<!--
  Toshi — a floating desktop companion (Clippy-energy). In Electron it's a frameless, transparent,
  always-on-top window you drag over any terminal. Mascot: the community-ready Toshi from
  tinyhumansai/mascots (GPL-3.0, attributed) — its Rive state machine has NO inputs, so we drive it by
  playing its named LINEAR animations (idle / wave / Dancing / Celebrating / eyes_* / mouth_*). Brain: the
  local Toshi MCP (/ask :4820) → codebase-memory-mcp. Nothing invented.
-->
<script src="https://unpkg.com/@rive-app/canvas@2.38.4/rive.js"></script>
<style>
  :root{
    /* BASED palette — Toshi is Base's cat, the pod wears Base blue (#0052FF) */
    --base:#0052FF; --base-soft:#4d7fff; --line:#162a5e; --ink:#e8eef6; --dim:#8ea0c4; --faint:#5a6a92;
    --teal:#4ec9b0; --amber:#e5b567;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:transparent}
  body{color:var(--ink); font-family:var(--mono); font-size:13px; display:grid; place-items:center; -webkit-font-smoothing:antialiased; overflow:hidden}

  .pod{
    width:min(300px,100vw); height:min(460px,100vh);
    display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0a1430 0%, #060b1c 100%);
    border:1px solid var(--line); border-radius:18px; overflow:hidden;
    box-shadow:0 30px 70px -28px #000, 0 0 44px -18px rgba(0,82,255,.45), 0 0 0 1px rgba(0,82,255,.06) inset;
    animation:pop .5s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.94)} to{opacity:1; transform:none}}

  .head{display:flex; align-items:center; gap:8px; padding:9px 12px; -webkit-app-region:drag; cursor:grab;
    background:linear-gradient(180deg, rgba(0,82,255,.16), rgba(0,82,255,.03)); border-bottom:1px solid rgba(0,82,255,.22)}
  .head:active{cursor:grabbing}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--base-soft);box-shadow:0 0 0 3px rgba(0,82,255,.22); animation:pulse-dot 3s ease-in-out infinite}
  @keyframes pulse-dot{50%{box-shadow:0 0 0 6px rgba(0,82,255,.07)}}
  .logo{font-weight:800; letter-spacing:.16em; font-size:12px}
  .logo b{color:var(--amber)}
  .pose-tag{margin-left:auto; color:var(--faint); font-size:9px; letter-spacing:.12em; text-transform:uppercase}
  .x{-webkit-app-region:no-drag; margin-left:8px; color:var(--faint); background:none; border:0; font:inherit; font-size:14px; cursor:pointer; line-height:1; padding:2px 4px}
  .x:hover{color:var(--ink)}

  .stage{position:relative; flex:1; min-height:0; cursor:pointer}
  .stage::before{content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 44%, rgba(0,82,255,.20), transparent 62%)}
  .floaty{position:absolute; inset:0; animation:float 5.5s ease-in-out infinite; transform-origin:50% 80%}
  @keyframes float{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
  /* react/nope are transient overlays — JS removes the class so float always resumes */
  .floaty.react{animation:react .5s ease}
  @keyframes react{0%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-4px) rotate(-3deg)} 60%{transform:translateY(-2px) rotate(2deg)} 100%{transform:none}}
  .floaty.nope{animation:nope .45s ease}
  @keyframes nope{0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}}
  #toshi{position:absolute; inset:0; width:100%; height:100%; display:block}
  .stage::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.4;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px)}
  .loading{position:absolute; inset:0; display:grid; place-items:center; color:var(--dim); font-size:11px}
  .loading.gone{display:none}

  .spark{position:absolute; width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:0;pointer-events:none;filter:blur(.3px)}
  .spark.go{animation:spark .9s ease-out forwards}
  @keyframes spark{0%{opacity:1; transform:translate(0,0) scale(1)} 100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.2)}}

  .bubble{
    position:absolute; left:10px; right:10px; bottom:8px;
    background:rgba(10,14,19,.94); border:1px solid var(--line); border-radius:12px;
    padding:9px 11px; font-size:12px; line-height:1.5; color:var(--ink);
    opacity:0; transform:translateY(6px); transition:.22s; pointer-events:none;
    max-height:52%; overflow:auto; white-space:pre-wrap;
  }
  .bubble.on{opacity:1; transform:none}
  .bubble .who{color:var(--amber); font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:3px; display:flex; align-items:center; gap:6px}
  .bubble .grounded{color:var(--teal); font-size:8px; border:1px solid rgba(78,201,176,.4); border-radius:6px; padding:0 4px}
  .dots span{animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.25} 50%{opacity:1}}

  .chips{display:flex; gap:6px; padding:0 11px 7px; -webkit-app-region:no-drag}
  .chips button{font:inherit; font-size:9.5px; letter-spacing:.04em; color:var(--dim); background:rgba(0,82,255,.10);
    border:1px solid rgba(0,82,255,.28); border-radius:999px; padding:4px 9px; cursor:pointer}
  .chips button:hover{color:var(--ink); background:rgba(0,82,255,.22)}
  .ask{display:flex; gap:8px; padding:9px 11px; border-top:1px solid rgba(0,82,255,.22);
    background:linear-gradient(180deg, rgba(0,82,255,.10), rgba(0,82,255,.02)); -webkit-app-region:no-drag}
  .ask input{flex:1; min-width:0; background:#070d1e; border:1px solid var(--line); border-radius:10px; color:var(--ink); font:inherit; font-size:12.5px; padding:9px 11px}
  .ask input::placeholder{color:var(--faint)}
  .ask input:focus{outline:none; border-color:var(--base-soft); box-shadow:0 0 0 3px rgba(0,82,255,.18)}
  .ask button{font:inherit; font-size:13px; font-weight:800; color:#fff; background:var(--base); border:0; border-radius:10px; padding:0 13px; cursor:pointer; box-shadow:0 4px 14px -6px rgba(0,82,255,.8)}
  .ask button:disabled{opacity:.5}
  .foot{padding:5px 10px 8px; color:var(--faint); font-size:8px; letter-spacing:.03em; text-align:center; -webkit-app-region:no-drag}
  .foot a{color:var(--dim); text-decoration:none}
  @media (prefers-reduced-motion:reduce){ .pod,.dot,.floaty,.spark{animation:none !important} }
</style>
</head>
<body>
  <div class="pod" role="application" aria-label="Toshi companion">
    <div class="head">
      <span class="dot" title="watching your session"></span>
      <span class="logo"><b>tosh</b>i</span>
      <span class="pose-tag" id="pose-tag">idle</span>
      <button class="x" id="x" title="hide" aria-label="hide Toshi">✕</button>
    </div>

    <div class="stage">
      <div class="floaty" id="floaty"><canvas id="toshi" width="620" height="820"></canvas></div>
      <div class="loading" id="loading">waking Toshi…</div>
      <div class="bubble" id="bubble"><div class="who">toshi <span class="grounded" id="grounded" hidden>from your repo</span></div><div id="bubble-body"></div></div>
    </div>

    <div class="chips" aria-label="quick asks">
      <button type="button" data-q="quoi de neuf ?">quoi de neuf</button>
      <button type="button" data-q="montre la structure">structure</button>
      <button type="button" data-fill="trouve ">trouve…</button>
    </div>
    <form class="ask" id="ask">
      <input id="q" autocomplete="off" placeholder="ask Toshi about your session…" aria-label="talk to Toshi" />
      <button type="submit" id="send">›</button>
    </form>
    <div class="foot"><span id="watching"></span>mascot <a href="https://github.com/tinyhumansai/mascots" target="_blank" rel="noopener">tinyhumans</a> · GPL-3.0 · on zero via MCP</div>
  </div>

<script>
const RIV_URL = 'https://raw.githubusercontent.com/tinyhumansai/mascots/main/mascots/toshi/toshi.riv';
const MCP_ASK = 'http://127.0.0.1:4820/ask'; // the brain (CORS open) — same target from file:// (Electron) or http (dev)
const $ = (id) => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
const rand = (a, b) => a + Math.random() * (b - a);
const pick = (xs) => xs[Math.floor(Math.random() * xs.length)];

/* ── THE OFFICIAL DRIVING API (how openhuman does it — ManifestRiveMascot.tsx) ─────────────────────
 * This mascot is driven by Rive DATA BINDING, not by playing linear animations: the artboard exposes a
 * ViewModel with three enums — pose / eyes / mouthVisemeCode — and "MascotSM" blends transitions
 * internally (no residual bones, no melted body, face always driven). Probed live from toshi.riv:
 *   pose:  idle · look_around · pointing · hand_wave · dancing · celebration · jumping · walking(_side) · running
 *   eyes:  NEUTRAL · blink · look_up/down/left/right · squinting · confused · thinking · closed
 *   mouth: the 15 Oculus viseme codes (sil = resting/closed)
 * Requires @rive-app/canvas ≥ 2.3x (autoBind + viewModelInstance). */
const EYE_CYCLE = ['look_up','look_down','look_left','look_right','blink','squinting','confused','thinking']; // manifest channel
const FLOURISH = ['look_around','pointing','hand_wave','dancing','celebration']; // ambient poses (openhuman-style)
const VISEMES = ['aa','E','ih','oh','ou','PP','DD'];

let rive = null, poseEnum = null, eyesEnum = null, mouthEnum = null, poseTimer = null;
const tag = (t) => { if ($('pose-tag')) $('pose-tag').textContent = t; };
const setEnum = (p, v) => { try { if (p) p.value = v; } catch {} };

function setPose(name, label, holdMs) {
  setEnum(poseEnum, name); tag((label || name).replace(/_/g, ' '));
  clearTimeout(poseTimer);
  if (name !== 'idle') poseTimer = setTimeout(() => { setEnum(poseEnum, 'idle'); tag('idle'); }, holdMs || 2600);
}
function celebrate() { setPose('celebration', '🎉 got it', 2800); }
function talk(ms) { // lip-flap via viseme codes; 'sil' closes the mouth at rest
  if (reduce) return;
  let t = 0; const iv = setInterval(() => { setEnum(mouthEnum, pick(VISEMES));
    if ((t += 150) > (ms || 1200)) { clearInterval(iv); setEnum(mouthEnum, 'sil'); } }, 150);
}
function reactWiggle(cls) { const f = $('floaty'); if (reduce || !f) return; f.classList.remove('react','nope'); void f.offsetWidth; f.classList.add(cls); setTimeout(() => f.classList.remove(cls), 480); }
function sparkle() {
  if (reduce) return; const st = document.querySelector('.stage');
  for (let i=0;i<10;i++){ const s=document.createElement('div'); s.className='spark'; const a=Math.random()*6.28, r=40+Math.random()*60;
    s.style.left='50%'; s.style.top='42%'; s.style.setProperty('--dx',Math.cos(a)*r+'px'); s.style.setProperty('--dy',Math.sin(a)*r+'px');
    st.appendChild(s); requestAnimationFrame(()=>s.classList.add('go')); setTimeout(()=>s.remove(),950); }
}

// ambient life, the openhuman way: rest 6–12s → one flourish held 2.5–5s → back to idle. Eyes cycle on the
// manifest cadence (2600ms, random), returning to NEUTRAL between glances so blinks stay momentary.
let busy = false;
function startLife() {
  if (reduce) return;
  (function ambient(){ setTimeout(() => {
    if (!busy && poseEnum && poseEnum.value === 'idle') setPose(pick(FLOURISH), null, rand(2500, 5000));
    ambient(); }, rand(6000, 12000)); })();
  setInterval(() => { if (busy) return; setEnum(eyesEnum, pick(EYE_CYCLE)); setTimeout(() => setEnum(eyesEnum, 'NEUTRAL'), 650); }, 2600);
}

function bootRive() {
  if (!window.rive) { $('loading').textContent = 'rive runtime blocked — needs network'; return; }
  try {
    rive = new window.rive.Rive({
      src: RIV_URL, canvas: $('toshi'), stateMachines: 'MascotSM', autoplay: true, autoBind: true,
      fit: 'contain', alignment: 'center',
      onLoad() {
        $('loading').classList.add('gone');
        try { rive.resizeDrawingSurfaceToCanvas(); } catch {}
        try {
          const vmi = rive.viewModelInstance;
          poseEnum = vmi.enum('pose'); eyesEnum = vmi.enum('eyes'); mouthEnum = vmi.enum('mouthVisemeCode');
          setEnum(eyesEnum, 'NEUTRAL'); setEnum(mouthEnum, 'sil'); // a driven face — no more weird resting expression
        } catch (e) { /* older runtime: mascot still renders on the SM defaults */ }
        setPose('hand_wave', 'hi 👋', 1900); reactWiggle('react'); // greet — the SM blends it cleanly
        startLife();
      },
      onLoadError() { $('loading').textContent = 'could not load Toshi (network)'; },
    });
  } catch { $('loading').textContent = 'rive init failed'; }
}
// debug hooks (pause stops the rAF loop so screenshots can capture)
window.__toshi = {
  pause: () => { try { rive.pause(); } catch {} },
  resume: () => { try { rive.play('MascotSM'); } catch {} },
  state: () => { try { return { pose: poseEnum && poseEnum.value, eyes: eyesEnum && eyesEnum.value, mouth: mouthEnum && mouthEnum.value }; } catch { return null; } },
  setPose: (p, ms) => setPose(p, null, ms),
};
window.addEventListener('resize', () => { try { rive && rive.resizeDrawingSurfaceToCanvas(); } catch {} });

let bubbleTimer = null;
function say(text, grounded, holdMs) {
  $('grounded').hidden = !grounded;
  $('bubble-body').textContent = text; $('bubble').classList.add('on');
  clearTimeout(bubbleTimer); bubbleTimer = setTimeout(() => $('bubble').classList.remove('on'), holdMs || 11000);
}
function thinking() { $('grounded').hidden = true; $('bubble-body').innerHTML = '<span class="dots"><span>•</span><span>•</span><span>•</span></span>'; $('bubble').classList.add('on'); }

async function submitQ(q) {
  if (!q || busy) return;
  $('q').value=''; $('send').disabled=true; busy = true;
  setPose('look_around', 'thinking', 15000); setEnum(eyesEnum, 'thinking'); reactWiggle('react'); thinking();
  try {
    const r = await fetch(MCP_ASK, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ q }) });
    if (!r.ok) throw new Error('mcp '+r.status);
    const j = await r.json();
    setEnum(eyesEnum, 'NEUTRAL');
    if (j.grounded) { celebrate(); sparkle(); } else { setPose('pointing', 'heads-up', 2200); }
    const text = j.spoken || j.answer || '(no answer)'; // zero-voiced when available, structural otherwise
    talk(Math.min(2600, text.length*22)); say(text, !!j.grounded, Math.max(9000, Math.min(20000, text.length*90)));
  } catch {
    setEnum(eyesEnum, 'confused'); setTimeout(() => setEnum(eyesEnum, 'NEUTRAL'), 1200);
    setPose('idle'); reactWiggle('nope');
    say("start my brain first:\n  node mcp/toshi-mcp.mjs\nthen I read your real session (via codebase-memory-mcp).", false);
  }
  busy = false; $('send').disabled=false; $('q').focus();
}
$('ask').addEventListener('submit', (e) => { e.preventDefault(); submitQ($('q').value.trim()); });
// quick chips: one tap = a real ask; "trouve…" pre-fills so you type just the symbol
document.querySelectorAll('.chips button').forEach((b) => b.addEventListener('click', () => {
  if (b.dataset.fill) { $('q').value = b.dataset.fill; $('q').focus(); return; }
  submitQ(b.dataset.q);
}));

// pet the cat: click the mascot → a little flourish + a short companion quip (local, no tokens)
const QUIPS = [
  (r) => `je garde un œil sur ${r} 👀`, () => 'pense à commit 😼', () => 'hydrate-toi, dev 💧',
  () => 'petit commit > gros regret', (r) => `${r} a l'air en forme`, () => 'ship it 🚀',
  () => 'un test de plus, un bug de moins', () => 'prr prr',
];
document.querySelector('.stage').addEventListener('click', () => {
  if (busy) return;
  setPose(pick(['dancing','jumping','celebration','hand_wave']), '😺', 2200); reactWiggle('react');
  say(pick(QUIPS)(watching || 'ton repo'), false, 4500);
});

// companion pulse: every 2.5 min ask the brain for a kind, grounded comment about the session —
// it only speaks on REAL new events (a fresh commit, files starting to move) or a rare gentle hello.
let lastPulse = '';
setInterval(async () => {
  if (busy || document.hidden) return;
  try {
    const p = await (await fetch('http://127.0.0.1:4820/pulse')).json();
    if (p.comment && p.comment !== lastPulse) {
      lastPulse = p.comment;
      setPose(p.event === 'commit' ? 'celebration' : 'hand_wave', p.event === 'commit' ? '🎉' : '😺', 2600);
      reactWiggle('react'); if (p.event === 'commit') sparkle();
      say(p.comment, true, 9500);
    }
  } catch {}
}, 150000);
$('x').addEventListener('click', () => { try { window.close(); } catch {} document.querySelector('.pod').style.display='none'; });

// Stay connected to the user's terminal: poll the brain for the repo it watches. When `toshi` is run in
// another terminal (POST /repo), the footer updates and Toshi announces the switch — visibly connected.
let watching = '';
async function pollWatching() {
  try {
    const j = await (await fetch('http://127.0.0.1:4820/health')).json();
    const base = String(j.repo || '').split(/[\\/]/).filter(Boolean).pop() || '';
    if (base && base !== watching) {
      const first = !watching; watching = base;
      const el = $('watching'); el.textContent = `watching ${base} · `; el.style.color = 'var(--teal)';
      if (!first) { say(`👀 now watching ${base}`, false, 5000); setPose('hand_wave', '👀 ' + base, 1900); }
    }
  } catch { const el = $('watching'); if (el) el.textContent = ''; watching = ''; }
}
setInterval(pollWatching, 4000); pollWatching();

bootRive();
</script>
</body>
</html>
